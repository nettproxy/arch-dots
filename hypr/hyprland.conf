bind = ,XF86KbdBrightnessDown,exec,brightnessctl -d smc::kbd_backlight set 10%-
bind = ,XF86KbdBrightnessUp,exec,brightnessctl -d smc::kbd_backlight set 10%+
bind = ALT, bracketright, exec, pamixer -i 5
bind = ALT, bracketleft, exec, pamixer -d 5
bind = SUPER SHIFT, A, exec, grim -g "$(slurp)" - | wl-copy
bind = SUPER SHIFT, T, exec, /home/monokai/.config/colors/bin/theme-menu
bind = SUPER SHIFT, W, exec, /home/monokai/.config/wallpapers/bin/wallpaper-menu
monitor=HDMI-A-1,1920x1080@180,auto,auto
monitor=DP-3,1920x1080@144,auto,auto
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = GDK_BACKEND,wayland
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
exec-once = mako

$terminal = kitty
$fileManager = dolphin
$menu = rofi -show drun
$browser = librewolf
$zei = kdenlive 

bind = SUPER, o, exec, dolphin
exec-once = /home/monokai/.config/wallpapers/bin/apply-wallpaper

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_DESKTOP XDG_SESSION_TYPE
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_DESKTOP XDG_SESSION_TYPE
exec-once = systemctl --user restart xdg-desktop-portal-hyprland.service xdg-desktop-portal.service
exec-once = /usr/lib/gnome-settings-daemon/gsd-xsettings

env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_STYLE_OVERRIDE,kvantum

exec-once = $terminal
exec-once = nm-applet &
exec-once = waybar

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_STYLE_OVERRIDE,kvantum

general {
    gaps_in = 4
    gaps_out = 5

    border_size = 2
    col.active_border = rgba(d79921ff)
    col.inactive_border = rgba(504945ff)

    resize_on_border = false

    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 0
    rounding_power = 0

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = yes
        range = 7
        render_power = 6
        color = rgba(00000099)
    }

    blur {
        enabled = yes
        size = 8 
        passes = 2
        new_optimizations = true
        vibrancy = 1
    }
}

QT_QPA_PLATFORMTHEME=qt5ct
QT_STYLE_OVERRIDE=kvantum

animations {
    enabled = yes

    bezier = smooth, 0.22, 1, 0.36, 1
    bezier = easeOut, 0.16, 1, 0.3, 1
    bezier = fadeCurve, 0.4, 0, 0.2, 1

    animation = global,        1, 7, smooth
    animation = border,        1, 8, easeOut
    animation = windows,       1, 5, smooth
    animation = windowsIn,     1, 5, smooth, popin 85%
    animation = windowsOut,    1, 4, easeOut, popin 85%

    animation = fadeIn,        1, 3, fadeCurve
    animation = fadeOut,       1, 3, fadeCurve
    animation = fade,          1, 4, fadeCurve

    animation = layers,        1, 5, smooth
    animation = layersIn,      1, 5, smooth, slide
    animation = layersOut,     1, 4, easeOut, slide
    animation = fadeLayersIn,  1, 3, fadeCurve
    animation = fadeLayersOut, 1, 3, fadeCurve

    animation = workspaces,    1, 5, smooth, slide
    animation = workspacesIn,  1, 5, smooth, slide
    animation = workspacesOut, 1, 5, smooth, slide

    animation = zoomFactor,    1, 6, easeOut
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = false  
}

input {
    kb_layout = de
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    accel_profile = flat
    follow_mouse = 1

    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

gesture = 3, horizontal, workspace

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


$mainMod = SUPER
bind = $mainMod, G, exec, $zei
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, Space, exec, $menu
bind = $mainMod, P, pseudo, 
bind = $mainMod, ", exec, $browser

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = SUPER, B, exec, helium-browser 

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

source = /home/monokai/.config/colors/generated/hyprland.conf
